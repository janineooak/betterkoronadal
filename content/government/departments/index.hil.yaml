# Department Pages
# This file contains all the pages/offices available under the City Government Departments section.
# Each entry maps to a markdown file in this folder: content/government/departments/{slug}.md

layout: grid
title: 'Mga Departamento kag Opisina sang Dakbanwa sang Koronadal'
description: 'Tuki-a ang mga opisina sang Dakbanwa sang Koronadal — ang ila mga mandato, ang mga serbisyo nga ila ginadulot, ang mga opisyal nga nagapanguna sa ila, kag kon paano sila kontakon.'
pages:
  - name: 'Opisina sang Alkalde sang Dakbanwa (Ehekutibo)'
    slug: 'executive'
    description: "Ang Opisina sang Alkalde sang Dakbanwa nagapanguna sa ehekutibo nga sanga — tukibi ang inyo Alkalde kag Bise Alkalde, ang mga programa sang dakbanwa, kag kon paano agdahon ang Alkalde sa mga hilikuton."
  - name: 'Sangguniang Panlungsod (Lehislatibo)'
    slug: 'legislative'
    description: 'Ang Konseho sang Dakbanwa nagahimo sang mga ordinansa kag sang tinuig nga badyet. Kilalaha ang napulo ka konsehal, ang mga ex-officio nga miyembro, kag ang nagapanguna nga Bise Alkalde.'
  - name: "Opisina sang Administrador sang Dakbanwa"
    slug: 'city-administrators-office'
    description: 'Nagakoordina sang bug-os nga administratibo nga operasyon sang gobyerno sang dakbanwa kag nagabulig sa Alkalde sa pagdumala sang tanan nga departamento.'
  - name: 'Opisina sang Accounting sang Dakbanwa'
    slug: 'city-accounting-office'
    description: 'Nagatipig sang opisyal nga mga kuwenta sang dakbanwa, nagaproseso sang mga disbursement, kag nagasertipika sang pagkaagi sang mga pondo.'
  - name: 'Opisina sang Agrikultura sang Dakbanwa'
    slug: 'city-agriculture-office'
    description: 'Nagasuporta sa mga mangunguma kag mangingisda paagi sa mga extension nga serbisyo, mga input, training, kag mga programa sa palangabuhian.'
  - name: "Opisina sang Architect sang Dakbanwa"
    slug: 'city-architects-office'
    description: 'Nagahanda sang mga disenyo kag plano nga arkitektural para sa imprastruktura sang dakbanwa kag nagarepaso sang mga standard sa disenyo sang mga balay.'
  - name: "Opisina sang Assessor sang Dakbanwa"
    slug: 'city-assessors-office'
    description: 'Nagatasa kag nagasusi sang mga real property para sa pagbuhis kag nagatipig sang mga rekord sang propyedad sang dakbanwa.'
  - name: 'Opisina sang Budget sang Dakbanwa'
    slug: 'city-budget-office'
    description: 'Nagahanda kag nagadumala sang tinuig nga badyet sang dakbanwa kag nagabantay sang paggamit sang mga pampubliko nga pondo.'
  - name: 'Civil Registrar sang Dakbanwa'
    slug: 'city-civil-registrar'
    description: 'Nagarehistro sang mga pagkatawo, kasal, kag kamatayon, kag nagahatag sang mga sertipikado nga dokumento sang civil registry.'
  - name: 'Opisina sang Kooperatiba sang Dakbanwa'
    slug: 'city-cooperative-office'
    description: 'Nagaorganisa, nagarehistro, kag nagapalambo sang mga kooperatiba kag mga enterprise sa komunidad sa dakbanwa.'
  - name: 'Opisina sang DILG sang Dakbanwa'
    slug: 'city-dilg-office'
    description: 'Ang lokal nga opisina sang Department of the Interior and Local Government (DILG) — nagasuporta sa mga barangay kag mga programa sa lokal nga pagdumala.'
  - name: 'Opisina sa Pag-pagamay kag Pagdumala sang Risgo sa Kalamidad sang Dakbanwa (CDRRMO)'
    slug: 'city-disaster-risk-reduction-and-management-office'
    description: 'Nagapanguna sa paghanda sa kalamidad, maaga nga pagpaandam, pagsabat sa emerhensiya, kag ang Korona-911 nga emergency hotline.'
  - name: 'Opisina sa Pagpalambo sang Economic Enterprise sang Dakbanwa (CEEDO)'
    slug: 'city-economic-enterprise-development-office'
    description: 'Nagadumala sang mga economic enterprise nga ginapadalagan sang dakbanwa pareho sang mga pampubliko nga merkado, terminal, kag iban pa nga mga pasilidad nga nagahatag sang kita.'
  - name: 'Opisina sang Engineering sang Dakbanwa'
    slug: 'city-engineering-office'
    description: 'Nagaplano, nagatukod, kag nagamentinar sang mga dalan, taytayan, kanal, kag pampubliko nga mga balay sang dakbanwa.'
  - name: 'Opisina sang Palibot kag Natural nga mga Manggad sang Dakbanwa (CENRO)'
    slug: 'city-environment-and-natural-resources-office'
    description: 'Nagaamlig sang palibot, nagadumala sang solid waste, kag nagapatuman sang mga regulasyon nga pangpalibot.'
  - name: 'Opisina sang Heneral nga mga Serbisyo sang Dakbanwa (CGSO)'
    slug: 'city-general-services-office'
    description: 'Nagadumala sang procurement, mga supply, mga rekord, kag pagmentinar sang propyedad kag mga pasilidad sang dakbanwa.'
  - name: 'Opisina sang Kahimusgan sang Dakbanwa (CHO)'
    slug: 'city-health-office'
    description: 'Nagahatag sang mga serbisyo sa pampubliko nga ikaayong lawas — libre nga check-up, bulong, bakuna, pag-atipan sa nagabata, kag mga programa sa kahimusgan.'
  - name: 'Opisina sa Pagdumala sang Human Resource sang Dakbanwa'
    slug: 'city-human-resource-management-office'
    description: 'Nagadumala sang recruitment, mga rekord sang personnel, kag ang kaayuhan kag pagpalambo sang mga empleyado sang gobyerno sang dakbanwa.'
  - name: 'Opisina sang Impormasyon sang Dakbanwa'
    slug: 'city-information-office'
    description: 'Nagadumala sang pampubliko nga impormasyon, opisyal nga mga pahibalo, kag ang komunikasyon sang gobyerno sang dakbanwa.'
  - name: 'Opisina sang Legal sang Dakbanwa'
    slug: 'city-legal-office'
    description: 'Nagahatag sang legal nga laygay sa gobyerno sang dakbanwa kag nagarepresentar sa dakbanwa sa mga legal nga butang.'
  - name: 'Librarya sang Dakbanwa'
    slug: 'city-library'
    description: 'Nagahatag sang pampubliko nga pag-access sa mga libro, reperensiya, kag mga kapamuslan sa pagtuon para sa mga pumuluyo kag estudyante.'
  - name: 'Opisina sa Pagplano kag Pagpalambo sang Dakbanwa (CPDO)'
    slug: 'city-planning-and-development-office'
    description: 'Nagahanda sang mga plano sa pagpalambo, ang Comprehensive Land Use Plan, kag nagakoordina sang mga programa sa pagpalambo sang dakbanwa.'
  - name: 'Opisina sang Populasyon sang Dakbanwa'
    slug: 'city-population-office'
    description: 'Nagapatuman sang mga programa sa populasyon kag family planning kag mga serbisyo sa responsable nga pagkaginikanan.'
  - name: 'Opisina sa Kaayuhan kag Pagpalambo sang Katilingban sang Dakbanwa (CSWDO)'
    slug: 'city-social-welfare-and-development-office'
    description: 'Nagahatag sang bulig sa mga tigulang, PWD, solo parent, kabataan, kag mga imol nga pamilya.'
  - name: 'Opisina sa Turismo kag mga Kultural nga Hilikuton sang Dakbanwa'
    slug: 'city-tourism-and-cultural-affairs-office'
    description: 'Nagapromote sang Koronadal bilang destinasyon kag nagaamlig sang kultura, pamana, kag mga piyesta sang dakbanwa.'
  - name: "Opisina sang Tesorero sang Dakbanwa"
    slug: 'city-treasurers-office'
    description: 'Nagasukot sang mga lokal nga buhis, bayad, kag singil, kag nagadumala sang mga pondo kag disbursement sang dakbanwa.'
  - name: 'Opisina sa Trapiko kag Pagdumala sang Dakbanwa'
    slug: 'city-traffic-and-management-office'
    description: 'Nagadumala sang dagan sang trapiko, kaligtasan sa dalan, kag ang maayo nga paghulag sang mga salakyan kag nagalakat.'
  - name: 'Opisina sang Beterinaryo sang Dakbanwa'
    slug: 'city-veterinary-office'
    description: 'Nagahatag sang mga serbisyo sa kahimusgan sang sapat, kontrol sa rabies, kag inspeksiyon sang kahayupan kag karne.'
