# Department Pages
# This file contains all the pages/offices available under the City Government Departments section.
# Each entry maps to a markdown file in this folder: content/government/departments/{slug}.md

layout: grid
title: 'Mga Kagawaran at Tanggapan ng Pamahalaang Panlungsod'
description: 'Tuklasin ang mga tanggapan ng Pamahalaang Panlungsod ng Koronadal — ang kanilang mga mandato, ang mga serbisyong ibinibigay nila, ang mga opisyal na namumuno sa kanila, at kung paano sila maaabot.'
pages:
  - name: 'Tanggapan ng Punong Lungsod (Ehekutibo)'
    slug: 'executive'
    description: 'Pinangungunahan ng Tanggapan ng Punong Lungsod ang sangay ehekutibo — hanapin ang inyong Punong Lungsod at Pangalawang Punong Lungsod, ang mga programa ng lungsod, at kung paano anyayahan ang Punong Lungsod sa mga okasyon.'
  - name: 'Sangguniang Panlungsod (Lehislatibo)'
    slug: 'legislative'
    description: 'Ang Sangguniang Panlungsod ang nagsasabatas ng mga ordinansa at ng taunang badyet. Makilala ang sampung konsehal, ang mga ex-officio na miyembro, at ang namumunong Pangalawang Punong Lungsod.'
  - name: 'Tanggapan ng City Administrator'
    slug: 'city-administrators-office'
    description: 'Nag-uugnay sa pangkalahatang administratibong operasyon ng pamahalaang panlungsod at tumutulong sa Punong Lungsod sa pamamahala ng lahat ng kagawaran.'
  - name: 'Tanggapan ng Accounting ng Lungsod'
    slug: 'city-accounting-office'
    description: 'Nag-iingat ng mga opisyal na account ng lungsod, nagpoproseso ng mga pagbabayad, at nagpapatunay ng kakayahang magamit ng pondo.'
  - name: 'Tanggapan ng Agrikultura ng Lungsod'
    slug: 'city-agriculture-office'
    description: 'Tumutulong sa mga magsasaka at mangingisda sa pamamagitan ng mga serbisyong extension, suplay, pagsasanay, at mga programa sa kabuhayan.'
  - name: 'Tanggapan ng City Architect'
    slug: 'city-architects-office'
    description: 'Naghahanda ng mga disenyong arkitektural at plano para sa imprastraktura ng lungsod at sumusuri sa mga pamantayan sa disenyo ng gusali.'
  - name: 'Tanggapan ng City Assessor'
    slug: 'city-assessors-office'
    description: 'Tumatasa at nag-aassess ng real property para sa pagbubuwis at nag-iingat ng mga rekord ng ari-arian ng lungsod.'
  - name: 'Tanggapan ng Badyet ng Lungsod'
    slug: 'city-budget-office'
    description: 'Naghahanda at namamahala sa taunang badyet ng lungsod at sumusubaybay sa paggamit ng pampublikong pondo.'
  - name: 'Tanggapan ng City Civil Registrar'
    slug: 'city-civil-registrar'
    description: 'Nagrerehistro ng mga kapanganakan, kasal, at kamatayan, at naglalabas ng mga sertipikadong dokumento ng civil registry.'
  - name: 'Tanggapan ng Kooperatiba ng Lungsod'
    slug: 'city-cooperative-office'
    description: 'Nag-oorganisa, nagrerehistro, at nagpapaunlad ng mga kooperatiba at mga negosyong pangkomunidad sa lungsod.'
  - name: 'Tanggapan ng DILG ng Lungsod'
    slug: 'city-dilg-office'
    description: 'Ang lokal na tanggapan ng Department of the Interior and Local Government (DILG) — tumutulong sa mga barangay at sa mga programa sa lokal na pamamahala.'
  - name: 'Tanggapan ng Pamamahala at Pagbabawas ng Panganib sa Sakuna ng Lungsod (CDRRMO)'
    slug: 'city-disaster-risk-reduction-and-management-office'
    description: 'Nangunguna sa paghahanda sa sakuna, maagang babala, tugon sa emerhensya, at sa Korona-911 emergency hotline.'
  - name: 'Tanggapan ng Pagpapaunlad ng Economic Enterprise ng Lungsod (CEEDO)'
    slug: 'city-economic-enterprise-development-office'
    description: 'Namamahala sa mga pinapatakbo ng lungsod na economic enterprise gaya ng mga pampublikong palengke, terminal, at iba pang pasilidad na kumikita.'
  - name: 'Tanggapan ng Engineering ng Lungsod'
    slug: 'city-engineering-office'
    description: 'Nagpaplano, nagtatayo, at nagpapanatili ng mga kalsada, tulay, drainage, at pampublikong gusali ng lungsod.'
  - name: 'Tanggapan ng Kapaligiran at Likas na Yaman ng Lungsod (CENRO)'
    slug: 'city-environment-and-natural-resources-office'
    description: 'Nangangalaga sa kapaligiran, namamahala sa solidong basura, at nagpapatupad ng mga regulasyong pangkapaligiran.'
  - name: 'Tanggapan ng Pangkalahatang Serbisyo ng Lungsod (CGSO)'
    slug: 'city-general-services-office'
    description: 'Humahawak sa pagbili, suplay, mga rekord, at sa pagpapanatili ng ari-arian at mga pasilidad ng lungsod.'
  - name: 'Tanggapan ng Kalusugan ng Lungsod (CHO)'
    slug: 'city-health-office'
    description: 'Naghahatid ng mga serbisyong pangkalusugang publiko — libreng check-up, gamot, bakuna, pangangalaga sa ina, at mga programang pangkalusugan.'
  - name: 'Tanggapan ng Pamamahala ng Yamang-Tao ng Lungsod'
    slug: 'city-human-resource-management-office'
    description: 'Namamahala sa recruitment, mga rekord ng tauhan, at sa kapakanan at pag-unlad ng mga empleyado ng pamahalaang panlungsod.'
  - name: 'Tanggapan ng Impormasyon ng Lungsod'
    slug: 'city-information-office'
    description: 'Namamahala sa pampublikong impormasyon, mga opisyal na anunsyo, at sa komunikasyon ng pamahalaang panlungsod.'
  - name: 'Tanggapan ng Legal ng Lungsod'
    slug: 'city-legal-office'
    description: 'Nagbibigay ng legal na payo sa pamahalaang panlungsod at kumakatawan sa lungsod sa mga usaping legal.'
  - name: 'Aklatan ng Lungsod'
    slug: 'city-library'
    description: 'Nagbibigay ng pampublikong access sa mga aklat, sanggunian, at mga mapagkukunan ng kaalaman para sa mga residente at mag-aaral.'
  - name: 'Tanggapan ng Pagpaplano at Pagpapaunlad ng Lungsod (CPDO)'
    slug: 'city-planning-and-development-office'
    description: 'Naghahanda ng mga plano sa pag-unlad, ng Comprehensive Land Use Plan, at nag-uugnay sa mga programa sa pag-unlad ng lungsod.'
  - name: 'Tanggapan ng Populasyon ng Lungsod'
    slug: 'city-population-office'
    description: 'Nagpapatupad ng mga programa sa populasyon at family planning at mga serbisyo sa responsableng pagiging magulang.'
  - name: 'Tanggapan ng Kagalingang Panlipunan at Pagpapaunlad ng Lungsod (CSWDO)'
    slug: 'city-social-welfare-and-development-office'
    description: 'Nagbibigay ng tulong sa mga senior citizen, PWD, solo parent, kabataan, at mga maralitang pamilya.'
  - name: 'Tanggapan ng Turismo at Pangkulturang Gawain ng Lungsod'
    slug: 'city-tourism-and-cultural-affairs-office'
    description: 'Nagtataguyod sa Koronadal bilang isang destinasyon at nangangalaga sa kultura, pamana, at mga pista ng lungsod.'
  - name: 'Tanggapan ng Ingat-Yaman ng Lungsod'
    slug: 'city-treasurers-office'
    description: 'Naniningil ng mga lokal na buwis, bayarin, at singil, at namamahala sa mga pondo at pagbabayad ng lungsod.'
  - name: 'Tanggapan ng Pamamahala ng Trapiko ng Lungsod'
    slug: 'city-traffic-and-management-office'
    description: 'Namamahala sa daloy ng trapiko, kaligtasan sa kalsada, at sa maayos na pagdaloy ng mga sasakyan at tao.'
  - name: 'Tanggapan ng Beterinaryo ng Lungsod'
    slug: 'city-veterinary-office'
    description: 'Nagbibigay ng mga serbisyong pangkalusugan ng hayop, kontrol sa rabies, at inspeksyon ng hayupan at karne.'
