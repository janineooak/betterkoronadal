# Department Pages
# This file contains all the pages/offices available under the City Government Departments section.
# Each entry maps to a markdown file in this folder: content/government/departments/{slug}.md

layout: grid
title: 'City Government Departments & Offices'
description: 'Explore the offices of the City Government of Koronadal — their mandates, the services they provide, the officials who lead them, and how to reach them.'
pages:
  - name: 'Office of the City Mayor (Executive)'
    slug: 'executive'
    description: "The Office of the City Mayor leads the executive branch — find your Mayor and Vice Mayor, the city's programs, and how to invite the Mayor to events."
  - name: 'Sangguniang Panlungsod (Legislative)'
    slug: 'legislative'
    description: 'The City Council enacts ordinances and the annual budget. Meet the ten councilors, the ex-officio members, and the presiding Vice Mayor.'
  - name: "City Administrator's Office"
    slug: 'city-administrators-office'
    description: 'Coordinates the overall administrative operations of the city government and assists the Mayor in managing all departments.'
  - name: 'City Accounting Office'
    slug: 'city-accounting-office'
    description: 'Keeps the official accounts of the city, processes disbursements, and certifies the availability of funds.'
  - name: 'City Agriculture Office'
    slug: 'city-agriculture-office'
    description: 'Supports farmers and fisherfolk with extension services, inputs, training, and livelihood programs.'
  - name: "City Architect's Office"
    slug: 'city-architects-office'
    description: 'Prepares architectural designs and plans for city infrastructure and reviews building design standards.'
  - name: "City Assessor's Office"
    slug: 'city-assessors-office'
    description: 'Appraises and assesses real property for taxation and maintains the city property records.'
  - name: 'City Budget Office'
    slug: 'city-budget-office'
    description: 'Prepares and manages the annual city budget and monitors the use of public funds.'
  - name: 'City Civil Registrar'
    slug: 'city-civil-registrar'
    description: 'Registers births, marriages, and deaths, and issues certified civil registry documents.'
  - name: 'City Cooperative Office'
    slug: 'city-cooperative-office'
    description: 'Organizes, registers, and develops cooperatives and community enterprises in the city.'
  - name: 'City DILG Office'
    slug: 'city-dilg-office'
    description: 'The local office of the Department of the Interior and Local Government — supports barangays and local governance programs.'
  - name: 'City Disaster Risk Reduction & Management Office (CDRRMO)'
    slug: 'city-disaster-risk-reduction-and-management-office'
    description: 'Leads disaster preparedness, early warning, emergency response, and the Korona-911 emergency hotline.'
  - name: 'City Economic Enterprise Development Office (CEEDO)'
    slug: 'city-economic-enterprise-development-office'
    description: 'Manages the city-run economic enterprises such as public markets, terminals, and other revenue-generating facilities.'
  - name: 'City Engineering Office'
    slug: 'city-engineering-office'
    description: 'Plans, builds, and maintains city roads, bridges, drainage, and public buildings.'
  - name: 'City Environment & Natural Resources Office (CENRO)'
    slug: 'city-environment-and-natural-resources-office'
    description: 'Protects the environment, manages solid waste, and enforces environmental regulations.'
  - name: 'City General Services Office (CGSO)'
    slug: 'city-general-services-office'
    description: 'Handles procurement, supplies, records, and the maintenance of city property and facilities.'
  - name: 'City Health Office (CHO)'
    slug: 'city-health-office'
    description: 'Delivers public health services — free check-ups, medicines, vaccines, maternal care, and health programs.'
  - name: 'City Human Resource Management Office'
    slug: 'city-human-resource-management-office'
    description: 'Manages recruitment, personnel records, and the welfare and development of city government employees.'
  - name: 'City Information Office'
    slug: 'city-information-office'
    description: 'Manages public information, official announcements, and the city government communications.'
  - name: 'City Legal Office'
    slug: 'city-legal-office'
    description: 'Provides legal advice to the city government and represents the city in legal matters.'
  - name: 'City Library'
    slug: 'city-library'
    description: 'Provides public access to books, references, and learning resources for residents and students.'
  - name: 'City Planning & Development Office (CPDO)'
    slug: 'city-planning-and-development-office'
    description: 'Prepares development plans, the Comprehensive Land Use Plan, and coordinates city development programs.'
  - name: 'City Population Office'
    slug: 'city-population-office'
    description: 'Implements population and family planning programs and responsible parenthood services.'
  - name: 'City Social Welfare & Development Office (CSWDO)'
    slug: 'city-social-welfare-and-development-office'
    description: 'Provides assistance to seniors, PWDs, solo parents, children, and indigent families.'
  - name: 'City Tourism & Cultural Affairs Office'
    slug: 'city-tourism-and-cultural-affairs-office'
    description: 'Promotes Koronadal as a destination and safeguards the city culture, heritage, and festivals.'
  - name: "City Treasurer's Office"
    slug: 'city-treasurers-office'
    description: 'Collects local taxes, fees, and charges, and manages the city funds and disbursements.'
  - name: 'City Traffic & Management Office'
    slug: 'city-traffic-and-management-office'
    description: 'Manages traffic flow, road safety, and the orderly movement of vehicles and pedestrians.'
  - name: 'City Veterinary Office'
    slug: 'city-veterinary-office'
    description: 'Provides animal health services, rabies control, and livestock and meat inspection.'
